name: Ruff

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.6"
          args: "check ."

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.6"
          args: "format --check ."